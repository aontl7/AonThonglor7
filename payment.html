<script>
// วางลิงก์ Apps Script ของพี่ตรงนี้
const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbxVWKyij6FhqH-4YbVNnKY5eZKTmu_xKsb4saQCaZtI5VZSloKndKI-7RTWoBRPoERl/exec";

// ...โค้ดส่วนอื่นๆ ที่เจนนี่เคยให้ไป...
const storedData = localStorage.getItem("pendingBooking");

if (storedData) {
    const bookingData = JSON.parse(storedData);
    
    // 1. ลอจิกของบอสอ้น: 125 + เลขห้อง + . + วันที่
    const roomNumber = "1"; // สมมติว่าห้อง 1 (เดี๋ยวค่อยทำตัวเลือกห้องทีหลัง)
    const checkinDate = new Date(bookingData.checkin).getDate(); // ดึงวันที่ เช่น 19
    const dayStr = String(checkinDate).padStart(2, '0'); // ทำให้เป็น 19
    
    // รวมร่างเป็นราคา: 125 + 1 + .19 = 1251.19
    const finalPrice = "125" + roomNumber + "." + dayStr;
    
    // 2. เจน QR Code อัตโนมัติจาก PromptPay.io
    // ใส่เบอร์พร้อมเพย์ของพี่อ้นแทนที่ 0907980860 นะคะ
    const myPromptPay = "0907980860"; 
    const qrUrl = `https://promptpay.io/${myPromptPay}/${finalPrice}.png`;
    
    // แสดงผลบนหน้าจอ
    document.getElementById("val-total").innerText = finalPrice + " THB";
    document.querySelector(".qr").src = qrUrl; // เปลี่ยนรูป QR เป็นของใหม่ที่มีราคา

    // แปลงวันที่โชว์ (เหมือนเดิม)
    function formatDisplayDate(dateStr) {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const d = new Date(dateStr);
        return d.getDate() + " " + months[d.getMonth()];
    }
    document.getElementById("val-checkin").innerText = formatDisplayDate(bookingData.checkin);
    document.getElementById("val-checkout").innerText = formatDisplayDate(bookingData.checkout);
    document.getElementById("val-nights").innerText = bookingData.nights;

    // อัปเดตข้อมูลที่จะส่งไป Sheets ให้มีเลขห้องและยอดเงินที่ตรงกันด้วย
    bookingData.totalPrice = finalPrice;
    bookingData.roomNumber = roomNumber;
    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));

    // --- ระบบนาฬิกานับถอยหลัง (เหมือนเดิม) ---
    const bookingTime = new Date(bookingData.timestamp).getTime();
    const expireTime = bookingTime + (10 * 60 * 1000);
    const timerElement = document.getElementById("timer");
    let countdown = setInterval(function(){
        const now = new Date().getTime();
        const distance = expireTime - now;
        if(distance < 0){
            clearInterval(countdown);
            timerElement.innerHTML = "QR Expired";
            return;
        }
        let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        let seconds = Math.floor((distance % (1000 * 60)) / 1000);
        timerElement.innerHTML = "Time left: " + minutes + ":" + (seconds < 10 ? "0"+seconds : seconds);
    }, 1000);
}
</script>
