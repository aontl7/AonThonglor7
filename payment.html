<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Aon Thonglor 7</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        .qr { width: 100%; max-width: 250px; margin: 20px 0; border: 1px solid #ddd; }
        .price-big { font-size: 32px; font-weight: bold; color: #000; margin: 10px 0; }
        .timer { color: red; font-weight: bold; margin: 10px 0; }
        .info { text-align: left; font-size: 14px; color: #555; line-height: 1.8; }
        .btn { display: block; background: #000; color: #fff; padding: 15px; border-radius: 10px; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Payment Detail</h2>
        <div class="info">
            Check-in: <span id="val-checkin">--</span><br>
            Nights: <span id="val-nights">--</span>
        </div>
        
        <div class="price-big" id="val-total">Loading...</div>
        
        <img src="" alt="QR Code" class="qr" id="qr-img">
        
        <div class="timer" id="timer">Time left: 10:00</div>
        
        <p style="font-size: 12px; color: #888;">กรุณาโอนยอดเงินให้ตรงจุดทศนิยม<br>เพื่อความรวดเร็วในการเช็กอินอัตโนมัติ</p>
        
        <a href="index.html" class="btn">Back to Home</a>
    </div>

    <script>
    // ดึงข้อมูลการจอง
    const dataStr = localStorage.getItem("pendingBooking");

    if (dataStr) {
        try {
            const booking = JSON.parse(dataStr);
            
            // 1. ลอจิกราคาบอส (1251 + .วันที่)
            const d = new Date(booking.checkin);
            const dayStr = String(d.getDate()).padStart(2, '0'); 
            const finalPrice = "1251." + dayStr; 
            
            // 2. เจน QR (เบอร์บอส)
            const myPromptPay = "0907980860"; 
            const qrUrl = "https://promptpay.io/" + myPromptPay + "/" + finalPrice + ".png";
            
            // 3. แสดงผล (ใส่ลง ID ที่สร้างไว้ข้างบน)
            document.getElementById("val-total").innerText = finalPrice + " THB";
            document.getElementById("qr-img").src = qrUrl;
            document.getElementById("val-checkin").innerText = booking.checkin;
            document.getElementById("val-nights").innerText = booking.nights || "1";

            // 4. ระบบนับถอยหลัง
            let timeLeft = 600;
            setInterval(function() {
                if(timeLeft <= 0) return;
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById("timer").innerText = "Time left: " + m + ":" + (s < 10 ? "0"+s : s);
            }, 1000);

        } catch (e) {
            console.error(e);
            document.body.innerHTML = "<h1>Data Error: กรุณากลับไปหน้าแรกแล้วจองใหม่ค่ะ</h1>";
        }
    } else {
        document.body.innerHTML = "<h1>No Booking Found: กรุณากลับไปหน้าแรกค่ะ</h1>";
    }
    </script>

</body>
</html>
