<!DOCTYPE html>
<html>
<head>
<title>Aon Thonglor 7 - Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

/* รูปหัว */
.header-img{
    width:100%;
    height:220px;
    object-fit:cover;
}

/* กล่อง */
.box{
    background:white;
    margin:-20px auto 20px; /* 🔥 ลดการซ้อน */
    padding:25px 25px 30px;
    border-radius:20px;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* SUMMARY */
.summary{
    margin:15px 0 15px;
}

/* row */
.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    border-bottom:1px solid #eee;
    padding-bottom:8px;
}

/* item */
.item{
    width:48%;
    text-align:left;
}

/* label */
.label{
    font-size:12px;
    color:#888;
}

/* value */
.value{
    font-size:16px;
    color:black;
    margin-top:4px;
    font-weight:500;
}

/* QR */
.qr{
    width:240px;
    margin:8px auto; /* 🔥 ลดระยะบนล่างครึ่งนึง */
}

/* ปุ่ม */
.btn{
    width:100%;
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:12px;
    margin-top:10px;
}

/* ปุ่มหลัก */
.primary{
    background:black;
    color:white;
}

/* ปุ่มรอง */
.secondary{
    background:#eee;
}

/* timer */
.timer{
    margin-top:5px;
    color:red;
    font-size:14px;
}
</style>

</head>

<body>

<!-- รูปหัว -->
<img src="building.PNG" class="header-img">

<div class="box">

<!-- SUMMARY -->
<div class="summary">

    <!-- แถว 1 -->
    <div class="row">
        <div class="item">
            <div class="label">Check-in</div>
            <div class="value">20 Mar</div>
        </div>

        <div class="item">
            <div class="label">Check-out</div>
            <div class="value">21 Mar</div>
        </div>
    </div>

    <!-- แถว 2 -->
    <div class="row">
        <div class="item">
            <div class="label">Nights</div>
            <div class="value">1</div>
        </div>

        <div class="item">
            <div class="label">Total</div>
            <div class="value">1,500 THB</div>
        </div>
    </div>

</div>

<!-- QR -->
<img src="qr.png" class="qr">
<p>Scan to Pay (PromptPay)</p>

<div class="timer">Time left: 10:00</div>

<!-- ปุ่ม -->
<a href="checkin.html">
    <button class="btn primary">I've Paid</button>
</a>

<button class="btn secondary" onclick="location.reload()">
Refresh QR
</button>

</div>

</body>
</html>
