<script>
// 1. ดึงข้อมูลจากหน้าที่แล้ว
const dataStr = localStorage.getItem("pendingBooking");

if (dataStr) {
    try {
        const booking = JSON.parse(dataStr);
        
        // --- ลอจิกราคาบอสอ้น (125 + ห้อง1 + .วันที่) ---
        const d = new Date(booking.checkin);
        const day = String(d.getDate()).padStart(2, '0'); 
        const finalPrice = "1251." + day; // ผลลัพธ์จะเป็น 1251.19
        
        // 2. เจน QR Code (เบอร์บอส)
        const myPromptPay = "0907980860"; 
        const qrUrl = "https://promptpay.io/" + myPromptPay + "/" + finalPrice + ".png";
        
        // 3. แสดงผลลงหน้าจอ (ดัก Error ไว้ทุกจุด)
        const elTotal = document.getElementById("val-total");
        if(elTotal) elTotal.innerText = finalPrice + " THB";
        
        const elQR = document.querySelector(".qr");
        if(elQR) elQR.src = qrUrl;

        const elIn = document.getElementById("val-checkin");
        if(elIn) elIn.innerText = booking.checkin;

        const elNights = document.getElementById("val-nights");
        if(elNights) elNights.innerText = booking.nights || "1";

        // 4. อัปเดตข้อมูลกลับเข้าเครื่อง
        booking.totalPrice = finalPrice;
        localStorage.setItem("pendingBooking", JSON.stringify(booking));

        // --- นับถอยหลัง (แบบเรียบง่าย ไม่ระเบิดแน่นอน) ---
        let timeLeft = 600; // 10 นาที
        const elTimer = document.getElementById("timer");
        if(elTimer) {
            setInterval(function() {
                if(timeLeft <= 0) { elTimer.innerText = "Expired"; return; }
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                elTimer.innerText = "Time left: " + m + ":" + (s < 10 ? "0"+s : s);
            }, 1000);
        }
    } catch (e) {
        console.error("Data error", e);
        // ถ้าข้อมูลเน่า ให้ล้างเครื่องแล้วกลับหน้าแรก
        localStorage.removeItem("pendingBooking");
        // window.location.href = "index.html"; 
    }
} else {
    // ถ้าไม่มีข้อมูลเลย ให้กลับหน้าแรก
    // window.location.href = "index.html";
}
</script>
