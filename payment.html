<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Aon Thonglor 7</title>
</head>
<body style="text-align:center; font-family:sans-serif; padding:0; margin:0; background:#f5f5f5;">

    <div style="width:100%; height:200px; overflow:hidden; background:#000;">
        <img src="building.PNG" alt="Aon Thonglor 7 Facade" style="width:100%; height:100%; object-fit:cover; opacity:0.8;">
    </div>

    <div style="max-width:400px; margin:-30px auto 40px; background:#fff; padding:30px 20px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); position:relative; z-index:1;">
        
        <h2 style="margin-top:0; color:#333;">Confirm Payment</h2>
        <p style="color:#777; margin-bottom:30px;">Aon Thonglor 7 • Bangkok</p>

        <div id="display-area">
            <p>Checking status...</p>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">
        
        <div style="font-size:14px; color:#666; text-align:left; line-height:1.8; background:#f9f9f9; padding:15px; border-radius:10px;">
            🏠 **Aon Thonglor 7**<br>
            📍 143/6 Thonglor Soi 7, Bangkok<br>
            📞 090-798-0860
        </div>

        <a href="index.html" style="display:block; margin-top:30px; padding:15px; background:#000; color:#fff; text-decoration:none; border-radius:10px; font-weight:bold;">Back to Home</a>
    </div>

    <script>
    const dataStr = localStorage.getItem("pendingBooking");
    const area = document.getElementById("display-area");

    if (dataStr) {
        try {
            const booking = JSON.parse(dataStr);
            const d = new Date(booking.checkin);
            const dayStr = String(d.getDate()).padStart(2, '0'); 
            const finalPrice = "1251." + dayStr; 
            const qrUrl = "https://promptpay.io/0907980860/" + finalPrice + ".png";

            area.innerHTML = `
                <div style="background:#fff; padding:20px; border:2px solid #eee; border-radius:15px;">
                    <p style="font-size:14px; color:#777; margin:0;">Total Amount</p>
                    <h1 style="font-size:48px; margin:10px 0; color:#000;">${finalPrice} <span style="font-size:20px; color:#555;">THB</span></h1>
                    
                    <img src="${qrUrl}" style="width:100%; max-width:280px; border:1px solid #ddd; margin:20px 0; border-radius:10px;">
                    
                    <div style="text-align:left; font-size:16px; color:#333; line-height:2; background:#f9f9f9; padding:15px; border-radius:10px;">
                        📅 Check-in: <b>${booking.checkin}</b><br>
                        🌙 Nights: <b>${booking.nights || "1"}</b><br>
                        👤 Type: <b>${booking.type || "Fast Check-in"}</b>
                    </div>

                    <p style="color:red; font-weight:bold; margin-top:20px; font-size:14px;">⚠️ Please transfer exactly ${finalPrice} THB</p>
                </div>
            `;
        } catch (e) {
            area.innerHTML = "<h1>Data Error: Please go back and try again.</h1>";
        }
    } else {
        area.innerHTML = "<h1>No Booking Found. Please start over.</h1>";
    }
    </script>
</body>
</html>
