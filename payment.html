<!DOCTYPE html>
<html>
<head>
<title>Aon Thonglor 7 - Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

/* รูปหัว */
.header-img{
    width:100%;
    height:220px;
    object-fit:cover;
}

/* กล่อง */
.box{
    background:white;
    margin:-20px auto 20px;
    padding:25px 25px 30px;
    border-radius:20px;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* SUMMARY */
.summary{
    margin:15px 0 15px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    border-bottom:1px solid #eee;
    padding-bottom:8px;
}

.item{
    width:48%;
    text-align:left;
}

.label{
    font-size:12px;
    color:#888;
}

.value{
    font-size:16px;
    color:black;
    margin-top:4px;
    font-weight:500;
}

/* QR */
.qr{
    width:240px;
    margin:8px auto;
}

/* ปุ่ม */
.btn{
    width:100%;
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor: pointer;
}

.primary{
    background:black;
    color:white;
}

.secondary{
    background:#eee;
}

/* timer */
.timer{
    margin-top:5px;
    color:red;
    font-size:16px;
    font-weight:bold;
}
</style>

</head>

<body>

<img src="building.PNG" class="header-img">

<div class="box">

<div class="summary">

    <div class="row">
        <div class="item">
            <div class="label">Check-in</div>
            <div class="value" id="val-checkin">...</div>
        </div>

        <div class="item">
            <div class="label">Check-out</div>
            <div class="value" id="val-checkout">...</div>
        </div>
    </div>

    <div class="row">
        <div class="item">
            <div class="label">Nights</div>
            <div class="value" id="val-nights">...</div>
        </div>

        <div class="item">
            <div class="label">Total</div>
            <div class="value" id="val-total">... THB</div>
        </div>
    </div>

</div>

<img src="qr.png" class="qr">
<p>Scan to Pay (PromptPay)</p>

<div id="timer" class="timer">Time left: 10:00</div>

<a href="waiting.html" style="text-decoration:none;">
    <button class="btn primary">I've Paid</button>
</a>

<button class="btn secondary" onclick="location.reload()">
Refresh QR
</button>

</div>

<script>
// 🔥 ดึงข้อมูลจากหน้าที่แล้ว (LocalStorage) มาแสดงผลอัตโนมัติ
const storedData = localStorage.getItem("pendingBooking");

if (storedData) {
    const bookingData = JSON.parse(storedData);
    
    // ฟังก์ชันช่วยแปลงวันที่จากตัวเลข (2026-03-19) เป็นตัวอักษรสวยๆ (19 Mar)
    function formatDisplayDate(dateStr) {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const d = new Date(dateStr);
        return d.getDate() + " " + months[d.getMonth()];
    }

    // เอาข้อมูลไปยัดใส่กล่องข้อความ
    document.getElementById("val-checkin").innerText = formatDisplayDate(bookingData.checkin);
    document.getElementById("val-checkout").innerText = formatDisplayDate(bookingData.checkout);
    document.getElementById("val-nights").innerText = bookingData.nights;
    
    // ใส่คอมม่าให้ยอดเงิน
    const priceNum = parseInt(bookingData.totalPrice);
    document.getElementById("val-total").innerText = priceNum.toLocaleString() + " THB";
}

// 🔥 ตั้งเวลาเริ่มต้น (10 นาที = 600 วินาที)
let timeLeft = 600;
let timerElement = document.getElementById("timer");

let countdown = setInterval(function(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    // เติม 0 หน้าเลข
    seconds = seconds < 10 ? "0" + seconds : seconds;
    timerElement.innerHTML = "Time left: " + minutes + ":" + seconds;
    timeLeft--;

    if(timeLeft < 0){
        clearInterval(countdown);
        timerElement.innerHTML = "QR Expired";
    }
}, 1000);
</script>

</body>
</html>
