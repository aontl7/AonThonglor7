<!DOCTYPE html>
<html>
<head>

<title>Checking Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

/* background */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('checkin2.PNG') center/cover no-repeat;
}

/* overlay (บาง ไม่ซีด) */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.25);
}

/* layout */
.container{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:40px 20px 80px;
}

/* card */
.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:44px 28px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);

    min-height:320px;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* text */
h2{
    text-align:center;
    margin:0;
    font-size:24px;
}

p{
    text-align:center;
    color:#777;
    margin-top:10px;
}

/* loader */
.loader{
    border:4px solid #eee;
    border-top:4px solid black;
    border-radius:50%;
    width:50px;
    height:50px;
    margin:30px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0);}
    100%{transform:rotate(360deg);}
}

/* note */
.note{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="card">

<h2>Checking Payment...</h2>

<p>Please wait while we verify your transfer</p>

<div class="loader"></div>

<p class="note">Do not close this page</p>

</div>

</div>

<script>
// URL ของ Google Apps Script ที่เราเพิ่ง Deploy กัน
const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbx8sGu-FbMMt23bZ-oRdTAl_0zAovIQVoNgfUIxjzZsuu_ezDXgtx_LCo9b6d-07s3T/exec";

// ดึงข้อมูลที่เตรียมไว้จาก LocalStorage
const storedData = localStorage.getItem("pendingBooking");

if (storedData) {
    const bookingData = JSON.parse(storedData);

    // ยิงข้อมูลเข้า Google Sheets แบบเบื้องหลัง
    fetch(googleAppsScriptURL, {
        method: "POST",
        body: JSON.stringify(bookingData) 
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "success") {
            // ถ้ายิงเข้าชีตสำเร็จ ให้เด้งไปหน้า Check-in เลย
            console.log("บันทึกข้อมูลสำเร็จ!");
            window.location.href = "checkin.html";
        } else {
            // ถ้าชีตพังหรือมีปัญหา
            alert("ขออภัยค่ะ เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + data.message);
            window.location.href = "index.html"; 
        }
    })
    .catch(error => {
        // ถ้าเน็ตหลุดหรือติดต่อเซิร์ฟเวอร์ไม่ได้
        console.error("Error submitting data:", error);
        alert("เครือข่ายมีปัญหา ไม่สามารถส่งข้อมูลได้ กรุณาติดต่อแอดมินค่ะ");
        window.location.href = "index.html";
    });

} else {
    // ดักไว้เผื่อมีคนแอบพิมพ์ URL เข้ามาหน้านี้ตรงๆ โดยไม่ได้กดจอง
    alert("ไม่พบข้อมูลการทำรายการค่ะ");
    window.location.href = "index.html";
}
</script>

</body>
</html>
