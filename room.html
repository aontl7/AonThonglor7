<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --room-purple: #e0b0ff; }
    body { background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; text-align: center; }
    
    .room-header { font-size: 2.5rem; font-weight: bold; color: var(--room-purple); margin: 10px 0 0 0; }
    .floor-info { color: #555; font-size: 0.9rem; margin-bottom: 10px; }
    .nav-box { border: 1px solid #303; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: #101; color: var(--room-purple); font-size: 0.85rem; }

    .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    .btn-door { background: #fff; color: #000; }

    .control-card { background: #111; border: 1px solid #444; border-radius: 15px; padding: 10px 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; height: 125px; }
    
    .display-box { width: 95px; text-align: left; display: flex; align-items: center; justify-content: flex-start; }
    .temp-text { font-size: 3.8rem; font-weight: bold; color: var(--room-purple); line-height: 1; }
    .degree-symbol { font-size: 1.8rem; vertical-align: top; margin-top: 5px; color: var(--room-purple); }
    
    .color-picker { width: 80px; height: 80px; border: none; background: transparent; cursor: pointer; -webkit-appearance: none; }
    .color-picker::-webkit-color-swatch { border-radius: 50%; border: 3px solid #fff; }
    
    .center-ctrl { width: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
    .small-btn { width: 48px; height: 45px; border-radius: 6px; border: 1.5px solid var(--room-purple); background: transparent; color: var(--room-purple); font-size: 1.5rem; font-weight: bold; cursor: pointer; }
    .slider-v { -webkit-appearance: slider-vertical; width: 32px; height: 95px; background: #444; }

    .power-group { width: 145px; display: flex; flex-direction: column; gap: 10px; margin-left: 8px; }
    .power-btn { width: 100%; height: 48px; border-radius: 8px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

    label { display: block; margin-top: 20px; color: #bbb; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2.5px; text-align: left; border-left: 3px solid var(--room-purple); padding-left: 10px; }

    .comment-area { width: 100%; background: #111; border: 1px solid #444; border-radius: 10px; color: #fff; padding: 12px; font-size: 0.9rem; box-sizing: border-box; margin-top: 8px; resize: none; }
    .btn-send { background: var(--room-purple); color: #000; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="room-header">ROOM 201</div>
  <div class="floor-info">FLOOR 2</div>
  <div class="nav-box">เดินตามไฟนำทางสีม่วง</div>

  <button class="btn btn-door" onclick="send('openDoor')">OPEN FRONT DOOR</button>

  <label>Air Conditioning</label>
  <div class="control-card">
    <div class="display-box"><span class="temp-text" id="temp">25</span><span class="degree-symbol">°</span></div>
    <div class="center-ctrl">
      <button class="small-btn" onclick="changeTemp(1)">+</button>
      <button class="small-btn" onclick="changeTemp(-1)">−</button>
    </div>
    <div class="power-group">
      <button class="power-btn" style="background: var(--room-purple); color: #000;" onclick="send('airOn')">ON</button>
      <button class="power-btn" style="background: #300; color: #f66; border: 1px solid #600;" onclick="send('airOff')">OFF</button>
    </div>
  </div>

  <label>Bed Lighting</label>
  <div class="control-card">
    <div class="display-box"><input type="color" class="color-picker" value="#e0b0ff" onchange="send('color', this.value.replace('#',''))"></div>
    <div class="center-ctrl"><input type="range" class="slider-v" min="1" max="100" value="80" orient="vertical" onchange="send('bright', this.value * 10)"></div>
    <div class="power-group">
      <button class="power-btn" style="background: #fff; color: #000;" onclick="send('on')">ON</button>
      <button class="power-btn" style="background: #222; color: #666; border: 1px solid #444;" onclick="send('off')">OFF</button>
    </div>
  </div>

  <label>Bath Lighting</label>
  <div class="control-card">
    <div class="display-box"><input type="color" class="color-picker" value="#ffc0cb" onchange="send('bathColor', this.value)"></div>
    <div class="center-ctrl"><input type="range" class="slider-v" min="1" max="100" value="100" orient="vertical" onchange="send('bathBri', this.value)"></div>
    <div class="power-group">
      <button class="power-btn" style="background: #fff; color: #000;" onclick="send('bathOn')">ON</button>
      <button class="power-btn" style="background: #222; color: #666; border: 1px solid #444;" onclick="send('bathOff')">OFF</button>
    </div>
  </div>

  <label>Suggestions (คำติชม)</label>
  <textarea id="comment" class="comment-area" rows="3" placeholder="Write your feedback here..."></textarea>
  <button class="btn btn-send" onclick="sendComment()">SEND FEEDBACK</button>

  <script>
    // URL Web App ล่าสุดของพี่อ้น (HHz3pPAlx9HWQ)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAnNOd097Ey6zAhx-bmk9vpZFtJ2j-nXCexwq5_TbK2txF9WuKQhHz3pPAlx9HWQ/exec";

    let currentTemp = 25;
    function changeTemp(val) {
      currentTemp += val;
      if(currentTemp < 18) currentTemp = 18;
      if(currentTemp > 30) currentTemp = 30;
      document.getElementById('temp').innerText = currentTemp;
      send('airSet' + currentTemp); 
    }
    
    function send(action, val = '') {
      const url = APPS_SCRIPT_URL + "?action=" + action + "&value=" + val;
      fetch(url, { mode: 'no-cors' });
    }

    function sendComment() {
      const msg = document.getElementById('comment').value;
      if(!msg) return;
      
      send('comment', encodeURIComponent(msg));
      
      alert("ทุกคำติดชมของท่านจะถูกอ่านโดยเจ้าของโรงแรมเพียงผู้เดียว เพื่อนำไปพัฒนาระบบให้ดีขึ้นอย่างรวดเร็วที่สุด\nขอบคุณที่สละเวลา🙏\n\nEvery feedback of yours will be read by the hotel owner only, to improve our system as quickly as possible.\nThank you for your time.🙏");
      
      document.getElementById('comment').value = ''; 
    }
  </script>
</body>
</html>
