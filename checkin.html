<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in - Aon Thonglor 7</title>
<style>
/* ธีม OLED Black ประหยัดไฟพิกเซลปิดสนิท 100% สำหรับบอสอ้น */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;text-align:center;}
.bg{position:fixed;width:100%;height:100%;background:url('checkin2.PNG') center/cover no-repeat;filter:brightness(0.2);z-index:-1;}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:-1;}
.container{min-height:100vh;display:flex;align-items:flex-end;justify:center;padding:40px 20px 80px;box-sizing:border-box;}
.card{width:100%;max-width:420px;background:#111;border-radius:24px;padding:30px;border:1px solid #222;box-shadow:0 20px 40px rgba(0,0,0,0.8);margin:0 auto;}
.map-box{width:100%;border-radius:16px;overflow:hidden;margin-bottom:20px;border:1px solid #333;}
.map-box iframe{width:100%;height:180px;border:none;display:block;}
.nav-btn{display:block;background:#222;color:#fff;text-align:center;padding:12px;text-decoration:none;font-weight:600;font-size:14px;margin-top:10px;border-radius:12px;border:1px solid #333;}
h2{margin:20px 0 10px;font-size:24px;letter-spacing:1px;}
p{color:#888;margin-top:10px;font-size:15px;}
.unlock-btn{margin-top:24px;width:100%;padding:20px;border:none;border-radius:16px;background:#fff;color:#000;font-size:18px;font-weight:bold;cursor:pointer;}
.unlock-btn:active{transform:scale(0.95);}
.loader{border:4px solid #222;border-top:4px solid #fff;border-radius:50%;width:50px;height:50px;margin:25px auto;animation:spin 1s linear infinite;display:none;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.success{display:none;text-align:center;font-size:18px;margin-top:15px;font-weight:bold;color:#8fce00;}
.note{text-align:center;font-size:12px;color:#444;margin-top:14px;}
.line-contact{display:block;text-align:center;margin-top:24px;color:#06C755;text-decoration:none;font-weight:bold;font-size:16px;}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
<div class="card">
    <div class="map-box">
        <iframe src="https://maps.google.com/maps?q=143/6%20Sing%20Waet%20Lom%20Alley%20Bangkok&z=17&output=embed"></iframe>
    </div>
    <a href="https://maps.google.com/maps?q=143/6%20Sing%20Waet%20Lom%20Alley%20Bangkok&z=17&output=embed" target="_blank" class="nav-btn">📍 Open in Google Maps (นำทาง)</a>

    <h2 id="title">Welcome / ยินดีต้อนรับ</h2>
    <p id="desc">Tap below to unlock / กดเพื่อเปิดประตู</p>

    <div class="loader" id="loader"></div>
    <button id="btn" class="unlock-btn" onclick="openDoor()">🔓 Unlock Entrance</button>

    <div class="success" id="success">Door Unlocked / ประตูเปิดแล้ว 🚪</div>
    <div class="note">Security enabled: One-time access only</div>

    <a href="https://line.me/ti/p/~YOUR_ID" target="_blank" class="line-contact">💬 Contact Admin (ติดต่อบอสอ้น)</a>
</div>
</div>

<script>
// --- ด่านกักกันพวกมือบอน (Security Check) ---
function checkAuth() {
    const bookingData = localStorage.getItem("pendingBooking");
    if (!bookingData) {
        alert("🔒 Access Denied: กรุณาจองและชำระเงินก่อนค่ะ");
        window.location.href = "index.html"; // ดีดกลับหน้าแรกทันที
        return null;
    }
    return JSON.parse(bookingData);
}

// เช็กทันทีที่โหลดหน้า
const authData = checkAuth();

async function openDoor(){
    if(!authData) return;

    let btn = document.getElementById("btn");
    let loader = document.getElementById("loader");
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");
    let success = document.getElementById("success");

    btn.disabled = true;
    btn.innerHTML = "Opening... / กำลังเปิด...";
    loader.style.display = "block";

    // URL ของ Shelly / Sonoff ที่บอสเตรียมไว้
    const doorURL = "https://script.google.com/macros/s/AKfycbxYF8QAf70ZRK0FmLLDG_4BKKT9b9Q1zr61LwP1Tq0I7BSlahx-0EGhznM0ost5Adkz/exec";

    try {
        // ยิงสัญญาณเปิดประตู
        await fetch(doorURL, { mode: 'no-cors' });
        
        setTimeout(function(){
            loader.style.display = "none";
            success.style.display = "block";
            title.innerHTML = "Welcome! / เข้าพักได้เลย";
            desc.innerHTML = "Enjoy your stay at Thonglor 7";
            btn.style.display = "none";
            
            // --- ทำลายหลักฐาน: ป้องกันคนแชร์ URL ไปให้เพื่อนเปิดต่อ ---
            localStorage.removeItem("pendingBooking");
        }, 2500);
        
    } catch (e) {
        alert("ระบบขัดข้อง กรุณาติดต่อบอสอ้นค่ะ");
        btn.disabled = false;
        btn.innerHTML = "🔓 Unlock Entrance";
    }
}
</script>
</body>
</html>
