<!DOCTYPE html>
<html>
<head>

<title>Aon Thonglor 7 Check-in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

/* 🔥 background เต็มจอ */
.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('checkin2.PNG') center/cover no-repeat;
    z-index:-2;
}

/* 🔥 overlay ให้ดู soft */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.75);
    z-index:-1;
}

/* container */
.container{
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:20px;
}

/* card */
.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:22px;
    padding:26px;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

/* title */
h2{
    margin:0;
    text-align:center;
    font-size:22px;
}

/* desc */
p{
    text-align:center;
    color:#777;
    font-size:14px;
    margin-top:6px;
}

/* button */
button{
    margin-top:24px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:black;
    color:white;
    font-size:18px;
}

/* loader */
.loader{
    border:3px solid #eee;
    border-top:3px solid black;
    border-radius:50%;
    width:36px;
    height:36px;
    margin:20px auto;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

/* success */
.success{
    display:none;
    text-align:center;
    font-size:20px;
    margin-top:16px;
}

/* note */
.note{
    text-align:center;
    font-size:12px;
    color:#aaa;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="card">

<h2 id="title">Welcome</h2>
<p id="desc">Tap below to unlock the entrance</p>

<div class="loader" id="loader"></div>

<button id="btn" onclick="openDoor()">🔓 Unlock Entrance</button>

<div class="success" id="success">
Door Unlocked 🚪
</div>

<div class="note">Door will unlock for a few seconds</div>

</div>

</div>

<script>

function openDoor(){

    let btn = document.getElementById("btn");
    let loader = document.getElementById("loader");
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");
    let success = document.getElementById("success");

    btn.disabled = true;
    btn.innerHTML = "Opening...";

    loader.style.display = "block";

    title.innerHTML = "Opening Door...";
    desc.innerHTML = "Please wait";

    setTimeout(function(){

        loader.style.display = "none";
        success.style.display = "block";

        title.innerHTML = "Welcome!";
        desc.innerHTML = "You may enter now";

        btn.style.display = "none";

    },2000);

}
</script>

</body>
</html>
