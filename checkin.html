<!DOCTYPE html>
<html>
<head>

<title>Aon Thonglor 7 Check-in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

/* รูปด้านบน */
.header-img{
    width:100%;
    height:260px;
    object-fit:cover;
}

/* กล่อง */
.box{
    background:white;
    margin:-40px auto 20px;
    padding:30px;
    border-radius:20px;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ข้อความ */
h2{
    margin-top:10px;
    font-size:22px;
}

p{
    color:#666;
    font-size:14px;
}

/* ปุ่ม */
button{
    margin-top:20px;
    padding:18px;
    font-size:18px;
    background:black;
    color:white;
    border:none;
    border-radius:12px;
    width:100%;
}

/* disabled */
button:disabled{
    background:#999;
}

/* loader */
.loader{
    border:4px solid #eee;
    border-top:4px solid black;
    border-radius:50%;
    width:40px;
    height:40px;
    margin:20px auto;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

/* success */
.success{
    display:none;
    font-size:20px;
    margin-top:20px;
}

.note{
    margin-top:10px;
    font-size:12px;
    color:#888;
}

</style>

</head>

<body>

<!-- 🔥 รูป -->
<img src="checkin.png" class="header-img">

<div class="box">

<h2 id="title">Welcome</h2>

<p id="desc">Tap below to unlock the entrance</p>

<!-- loader -->
<div class="loader" id="loader"></div>

<!-- ปุ่ม -->
<button id="btn" onclick="openDoor()">🔓 Unlock Entrance</button>

<!-- success -->
<div class="success" id="success">
Door Unlocked 🚪
</div>

<div class="note">Door will unlock for a few seconds</div>

</div>

<script>

function openDoor(){

    let btn = document.getElementById("btn");
    let loader = document.getElementById("loader");
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");
    let success = document.getElementById("success");

    // disable ปุ่ม
    btn.disabled = true;
    btn.innerHTML = "Opening...";

    // แสดง loader
    loader.style.display = "block";

    title.innerHTML = "Opening Door...";
    desc.innerHTML = "Please wait";

    // 🔥 จำลองยิง API เปิดประตู (2 วิ)
    setTimeout(function(){

        loader.style.display = "none";
        success.style.display = "block";

        title.innerHTML = "Welcome!";
        desc.innerHTML = "You may enter now";

        btn.style.display = "none";

    },2000);

}
</script>

</body>
</html>
