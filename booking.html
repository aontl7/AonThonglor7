<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aon Thonglor 7</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

.price{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

small{
font-size:14px;
color:#666;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

.status{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Aon Thonglor 7</h1>

<div class="price">
1500 <small>THB / night</small>
</div>

<input type="date" id="checkin">
<input type="date" id="checkout">

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="line" placeholder="LINE ID">

<button onclick="bookRoom()">Book Room</button>

<div class="status" id="status"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbyxeDGAOHYKrp7SxKj2ST356D2IQ1K0kKbV6yxtOri3wCYJrVHe2y5c9EhycKV_iDRU/exec";

function bookRoom(){

let checkin=document.getElementById("checkin").value;
let checkout=document.getElementById("checkout").value;
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let line=document.getElementById("line").value;

if(!checkin || !checkout || !name){
document.getElementById("status").innerHTML="Please fill required fields";
return;
}

fetch(api,{
method:"POST",
body:JSON.stringify({
checkin:checkin,
checkout:checkout,
name:name,
phone:phone,
line:line
})
})
.then(res=>res.text())
.then(data=>{

if(data=="FULL"){
document.getElementById("status").innerHTML="❌ Room Full";
}

if(data=="BOOKED"){
document.getElementById("status").innerHTML="✅ Booking Confirmed";
}

})
.catch(err=>{
document.getElementById("status").innerHTML="Error connecting server";
});

}

</script>

</body>
</html>
