<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking - Aon Thonglor 7</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f2f2;
}

/* รูปด้านบน */

.hero img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

/* กล่อง booking */

.booking-box{

width:90%;
max-width:520px;

margin:-60px auto 60px auto;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

/* หัวข้อ */

.booking-title{

text-align:center;
font-size:24px;
font-weight:700;

margin-bottom:20px;

}

/* input */

input{

width:100%;

padding:18px;

margin:10px 0;

border-radius:14px;
border:1px solid #ddd;

font-size:16px;

box-sizing:border-box;

}

/* ปุ่ม */

button{

width:100%;

padding:18px;

margin-top:15px;

border:none;

border-radius:16px;

background:black;
color:white;

font-size:18px;
font-weight:600;

}

</style>

</head>

<body>

<!-- รูปด้านบน -->

<div class="hero">
<img src="room2.PNG">
</div>


<!-- กล่อง booking -->

<div class="booking-box">

<div class="booking-title">
Booking - Aon Thonglor 7
</div>

<input type="date">

<input type="date">

<input type="text" placeholder="Your Name">

<input type="text" placeholder="Phone">

<input type="text" placeholder="LINE ID">

<button>
Confirm Booking
</button>

</div>

</body>
</html>
