<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking - Aon Thonglor 7</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f2f2;
}

/* รูปด้านบน */

.hero img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

/* กล่อง booking */

.booking-box{

width:92%;
max-width:520px;

margin:0 auto 60px auto;

background:white;

padding:30px;

border-radius:20px 20px 0 0;

box-shadow:0 -5px 20px rgba(0,0,0,0.08);

}

/* หัวข้อ */

.booking-title{

text-align:center;
font-size:24px;
font-weight:700;

margin-bottom:25px;

}

/* label */

label{

font-size:14px;
font-weight:600;
color:#444;

display:block;

margin-top:10px;

}

/* input */

input{

width:100%;

padding:16px;

margin-top:6px;

border-radius:14px;
border:1px solid #ddd;

font-size:16px;

box-sizing:border-box;

background:#fafafa;

}

/* ปุ่ม */

button{

width:100%;

padding:18px;

margin-top:20px;

border:none;

border-radius:16px;

background:black;
color:white;

font-size:18px;
font-weight:600;

cursor:pointer;

}

</style>

</head>

<body>

<div class="hero">
<img src="room2.PNG">
</div>

<div class="booking-box">

<div class="booking-title">
Booking - Aon Thonglor 7
</div>

<label>Check-in</label>
<input type="date">

<label>Check-out</label>
<input type="date">

<label>Your Name</label>
<input type="text" placeholder="Enter your name">

<label>Phone</label>
<input type="text" placeholder="Phone number">

<label>LINE ID</label>
<input type="text" placeholder="LINE ID">

<button>
Confirm Booking
</button>

</div>

</body>
</html>
