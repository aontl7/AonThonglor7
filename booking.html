<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book in Advance - Aon Thonglor 7</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f2f2f2;}
.hero img{width:100%;height:300px;object-fit:cover;display:block;}
.booking-box{width:92%;max-width:520px;margin:-20px auto 30px auto;background:white;padding:20px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.date-row{display:flex;gap:10px;margin-bottom:10px;}
.date-field{flex:1;}
label{font-size:14px;font-weight:600;color:#555;display:block;margin-bottom:4px;}
input{width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;box-sizing:border-box;background:#fafafa;}
input[type="date"]{height:40px;padding:6px 10px;font-size:14px;}
.summary{margin-top:14px;background:#f5f5f5;padding:16px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:600;}
.input-group{margin-top:12px;}
button{width:100%;padding:16px;margin-top:16px;border:none;border-radius:14px;background:black;color:white;font-size:17px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<div class="hero">
<img src="room2.PNG" alt="Room">
</div>

<div class="booking-box">
  <div class="date-row">
    <div class="date-field">
      <label>Check-in</label>
      <input type="date" id="checkin">
    </div>
    <div class="date-field">
      <label>Check-out</label>
      <input type="date" id="checkout">
    </div>
  </div>

  <div class="summary">
    <div><span id="nights">1</span> Nights</div>
    <div><span id="price">0</span> THB</div>
  </div>

  <div class="input-group">
    <input type="text" placeholder="Your name" id="name">
  </div>
  <div class="input-group">
    <input type="text" placeholder="Phone number" id="phone">
  </div>
  <div class="input-group">
    <input type="text" placeholder="LINE ID" id="line">
  </div>

  <button onclick="confirmBooking()">Book in Advance</button>
</div>

<script>
// --- Config ---
const holdTimeMinutes = 10;

// --- Elements ---
const checkin = document.getElementById("checkin");
const checkout = document.getElementById("checkout");
const nightsText = document.getElementById("nights");
const priceText = document.getElementById("price");
const inputName = document.getElementById("name");
const inputPhone = document.getElementById("phone");
const inputLine = document.getElementById("line");

// --- Dummy bookedDates ---
let bookedDates = []; // ["2026-03-20","2026-03-21"]

async function loadBookedDates(){
  try{
    const res = await fetch("https://script.google.com/macros/s/AKfycbwxKIMgfK8VQbQw3OtH2W29HcSx94SeUv_8NygBVr02jbzkuCW4Y37Xabm52AZXUEat/exec");
    bookedDates = await res.json();
    setInitialDates();
  } catch(e){ console.log("Cannot load booked dates:", e);}
}
loadBookedDates();

// --- Utilities ---
function showAlert(msgEng,msgThai){alert(msgEng+"\n"+msgThai);}
function formatDate(d){return d.toISOString().split('T')[0];}
function isRangeBlocked(start,end){
  let current = new Date(start);
  while(current < end){
    let d = formatDate(current);
    if(bookedDates.includes(d)) return true;
    current.setDate(current.getDate()+1);
  }
  return false;
}

// --- Set initial dates (Check-in tomorrow) ---
function setInitialDates(){
  let today = new Date();
  let checkInDate = new Date(today);
  checkInDate.setDate(checkInDate.getDate()+1); // วันพรุ่งนี้
  let checkOutDate = new Date(checkInDate);
  checkOutDate.setDate(checkOutDate.getDate()+1); // 1 คืน

  checkin.value = formatDate(checkInDate);
  checkout.value = formatDate(checkOutDate);

  updateSummary();
}

// --- Update summary ---
async function updateSummary(){
  const start = new Date(checkin.value+'T00:00:00');
  const end = new Date(checkout.value+'T00:00:00');
  const nights = Math.round((end-start)/(1000*60*60*24));
  nightsText.innerText = nights;

  // --- ดึงราคา dynamic จาก Sheet ---
  try{
    const res = await fetch("https://script.google.com/macros/s/your_price_sheet_url/exec?checkin="+checkin.value+"&checkout="+checkout.value);
    const data = await res.json();
    const total = data.totalPrice || 0;
    priceText.innerText = total.toLocaleString();
  }catch(e){
    console.log("Cannot fetch price, set 0");
    priceText.innerText = 0;
  }
}

// --- Allow user to edit dates freely ---
checkin.addEventListener("input",updateSummary);
checkout.addEventListener("input",updateSummary);

// --- Confirm Booking ---
function confirmBooking(){
  const start = new Date(checkin.value+'T00:00:00');
  const end = new Date(checkout.value+'T00:00:00');

  // ตรวจเฉพาะวันผิด/เต็ม/ย้อนหลัง
  const today = new Date();
  today.setHours(0,0,0,0);
  if(end <= start || start < today || isRangeBlocked(start,end)){
    showAlert("Invalid date or unavailable","วันที่ไม่ถูกต้องหรือถูกจองแล้ว");
    setInitialDates(); // reset เป็นวันพรุ่งนี้
    return;
  }

  // --- Pending ---
  const holdExpiry = new Date();
  holdExpiry.setMinutes(holdExpiry.getMinutes() + holdTimeMinutes);
  console.log("Room pending until:", holdExpiry.toISOString());

  // Alert 2 ภาษา
  showAlert("Booking Pending! Scan QR to pay","จองพักแล้ว! สแกน QR เพื่อชำระเงิน");

  // --- Redirect to payment.html ---
  window.location.href = "payment.html";

  // --- Optional: บันทึกข้อมูลลง Sheet ถ้ามี ---
  const bookingData = {
    checkin: checkin.value,
    checkout: checkout.value,
    name: inputName.value.trim(),
    phone: inputPhone.value.trim(),
    line: inputLine.value.trim(),
    timestamp: new Date().toISOString()
  };
  console.log("Booking data (to save if provided):", bookingData);
}
</script>

</body>
</html>
