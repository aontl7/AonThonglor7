<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aon Thonglor 7 - Van Helsing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #000; text-align: center; color: #fff; }
        .hero img { width: 100%; display: block; filter: grayscale(20%); }
        .container { padding: 30px 20px 60px; background: #111; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; }
        h1 { font-size: 32px; margin: 10px 0; color: #fff; letter-spacing: 1px; }
        .subtitle { color: #888; font-size: 16px; margin-bottom: 20px; }
        .price-tag { background: #222; display: inline-block; padding: 10px 25px; border-radius: 50px; border: 1px solid #333; margin-bottom: 25px; }
        .price { font-size: 24px; color: #fff; font-weight: bold; }
        .checkin { color: #aaa; font-size: 14px; margin-top: 5px; }
        .facilities { color: #666; font-size: 14px; margin-bottom: 40px; line-height: 1.8; }
        
        /* ปุ่มสไตล์ดุดัน ขวา-ซ้าย ตามสั่ง */
        .button { display: block; background: #fff; color: #000; text-decoration: none; padding: 20px; margin: 15px auto; max-width: 340px; border-radius: 16px; font-size: 18px; cursor: pointer; border: none; width: 100%; box-sizing: border-box; font-weight: 800; transition: 0.3s; }
        .button:active { transform: scale(0.98); }
        .button.secondary { background: #222; color: #fff; border: 1px solid #444; }
        .button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .map { margin-top: 50px; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        iframe { width: 100%; height: 300px; border: 0; filter: invert(90%) hue-rotate(180deg); } /* แผนที่โหมดมืด */
    </style>
</head>
<body>

<div class="hero">
    <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&q=80&w=1000" alt="Thonglor 7 Room">
</div>

<div class="container">
    <h1>Aon Thonglor 7</h1>
    <div class="subtitle">Boutique Room in Thonglor • Bangkok</div>
    
    <div class="price-tag">
        <div class="price">1,500 THB / Night</div>
        <div class="checkin">Self Check-in 24 Hours 🛡️</div>
    </div>

    <div class="facilities">
        ⚡ High-Speed WiFi • ❄️ Aircon • 🚿 Hot Shower<br>
        🥤 Fridge • 🍞 Microwave • 🧹 Clean & Safe
    </div>

    <button class="button" id="btnFastCheckin" onclick="fastCheckIn()">Fast Check-in (เข้าพักคืนนี้)</button>

    <a class="button secondary" href="booking.html">Book in Advance</a>

    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3875.787143491959!2d100.5824!3d13.7317!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTPCsDQzJzU0LjEiTiAxMDDCsDM0JzU2LjYiRQ!5e0!3m2!1sth!2sth!4v1647800000000!5m2!1sth!2sth"></iframe>
    </div>
</div>

<script>
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function fastCheckIn() {
    // ด่านกันนิ้วลั่น (Yes ขวา / No ซ้ายแดง)
    const result = await Swal.fire({
        title: 'ยืนยันการจองคืนนี้?',
        text: "คุณต้องการจองเพื่อเข้าพักทันทีใช่หรือไม่",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#000', 
        cancelButtonColor: '#dc3545', // สีแดง (ซ้าย)
        confirmButtonText: 'ใช่, จองเลย!',
        cancelButtonText: 'ไม่ใช่, กดผิด',
        reverseButtons: true, // สั่งให้ Yes อยู่ขวา ตามที่ท่านสั่ง!
        background: '#1a1a1a',
        color: '#fff'
    });

    if (!result.isConfirmed) return;

    const btn = document.getElementById('btnFastCheckin');
    btn.disabled = true;
    btn.innerText = "กำลังตรวจสอบห้องว่าง...";

    // URL Apps Script ของท่านแวนเฮวซิ่ง
    const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbxH7We7B-LdO6zwQ30LPgOxHIRmv0907-At52vBUtutkaNUBZHNs0XlW7oZMGSnkVCq/exec"; 

    try {
        const response = await fetch(googleAppsScriptURL);
        const data = await response.json(); 
        
        const today = new Date();
        const checkinStr = getLocalYYYYMMDD(today);
        const tomorrow = new Date();
        tomorrow.setDate(today.getDate() + 1);

        if(data.bookedDates && data.bookedDates.includes(checkinStr)) {
            Swal.fire({
                title: 'ห้องเต็มแล้วค่ะ',
                text: 'ขออภัยค่ะ คืนนี้มีปีศาจ...เอ้ย! มีแขกจองเต็มแล้ว',
                icon: 'error',
                confirmButtonColor: '#000'
            });
            btn.disabled = false;
            btn.innerText = "Fast Check-in (เข้าพักคืนนี้)";
            return; 
        }
        
        const currentPrice = data.price ? data.price : "1500";

        const bookingData = {
            checkin: checkinStr,
            checkout: getLocalYYYYMMDD(tomorrow),
            nights: 1,
            totalPrice: currentPrice,
            type: "Fast Check-in",
            timestamp: new Date().toISOString()
        };

        localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
        window.location.href = "payment.html";

    } catch (error) {
        console.error("Error:", error);
        Swal.fire('การเชื่อมต่อมีปัญหา', 'กรุณาลองใหม่อีกครั้งค่ะ', 'error');
        btn.disabled = false;
        btn.innerText = "Fast Check-in (เข้าพักคืนนี้)";
    }
}
</script>

</body>
</html>
