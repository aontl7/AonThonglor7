<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aon Thonglor 7 - Premium Boutique Room</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* OLED Black Style */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #000; 
            color: #fff; 
            line-height: 1.5; 
        }
        .hero { position: relative; height: 320px; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .container { 
            background: #111; 
            border-radius: 32px 32px 0 0; 
            margin-top: -28px; 
            position: relative; 
            padding: 28px 20px 40px; 
            border: 1px solid rgba(255,255,255,0.08); 
            border-top: none; 
        }
        h1 { 
            font-size: 32px; font-weight: 700; margin-bottom: 4px; 
            background: linear-gradient(135deg, #fff 0%, #ccc 100%); 
            -webkit-background-clip: text; background-clip: text; color: transparent; 
        }
        .subtitle { color: #888; font-size: 15px; margin-bottom: 20px; }
        .price-card { 
            background: #1a1a1a; border-radius: 24px; padding: 16px 20px; 
            margin: 16px 0; border: 1px solid #2a2a2a; 
        }
        .price-label { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .price-value { font-size: 36px; font-weight: 800; color: #fff; }
        .price-value small { font-size: 16px; font-weight: 400; color: #888; }
        .checkin-badge { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: #1a1a1a; padding: 8px 16px; border-radius: 40px; 
            font-size: 14px; color: #ccc; margin-bottom: 16px; 
        }
        .facilities { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; justify-content: center; }
        .facility-item { background: #1a1a1a; padding: 8px 16px; border-radius: 30px; font-size: 13px; color: #ddd; }
        .btn-primary { 
            display: block; width: 100%; max-width: 320px; margin: 16px auto; 
            background: #fff; color: #000; text-align: center; padding: 16px; 
            border-radius: 60px; font-weight: 700; font-size: 17px; border: none; cursor: pointer; 
        }
        .btn-secondary { 
            display: block; width: 100%; max-width: 320px; margin: 12px auto; 
            background: transparent; color: #ccc; text-align: center; padding: 15px; 
            border-radius: 60px; font-weight: 600; border: 1px solid #333; text-decoration: none; 
        }
        .map-container { margin: 32px 0; border-radius: 28px; overflow: hidden; border: 1px solid #2a2a2a; }
        .footer-note { text-align: center; font-size: 12px; color: #555; margin-top: 24px; }
    </style>
</head>
<body>

<div class="hero">
    <img src="room.png" alt="Aon Thonglor 7" onerror="this.src='https://placehold.co/800x600/1a1a1a/666?text=Aon+Thonglor+7'">
</div>

<div class="container">
    <h1>Aon Thonglor 7</h1>
    <div class="subtitle">Boutique Room • Thonglor • Bangkok</div>
    
    <div class="price-card">
        <div class="price-label">ราคาคืนนี้ (รวมภาษี)</div>
        <div class="price-value">
            <span id="displayPrice">...</span> <small>THB / Night</small>
        </div>
    </div>
    
    <div class="checkin-badge">
        <span>🕒</span> Self Check-in 24 ชม. 🛡️ ปลอดภัย มั่นใจ
    </div>
    
    <div class="facilities">
        <span class="facility-item">📶 WiFi เร็ว</span>
        <span class="facility-item">❄️ แอร์เย็น</span>
        <span class="facility-item">🚿 น้ำร้อน</span>
        <span class="facility-item">🧊 ตู้เย็น</span>
    </div>

    <button class="btn-primary" id="btnFastCheckin">⚡ Fast Check-in (คืนนี้)</button>
    <a class="btn-secondary" href="booking.html">📅 จองล่วงหน้า</a>

    <div class="map-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3875.7970912943456!2d100.579367!3d13.7307312!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30e29fac9dbff2a3%3A0x6f9b0a8cc8a0d9b8!2s143%2F6%20Sing%20Waet%20Lom%20Alley%2C%20Khwaeng%20Khlong%20Tan%20Nuea%2C%20Watthana%2C%20Krung%20Thep%20Maha%20Nakhon%2010110!5e0!3m2!1sen!2sth!4v1774057508289!5m2!1sen!2sth" 
            width="100%" 
            height="280" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
    
    <div class="footer-note">รองรับการจองผ่านระบบอัตโนมัติ • ข้อมูลปลอดภัย</div>
</div>

<script>
    // --- URL ของ Web App จาก Google Apps Script ---
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgz12OXm9jX9RaDS7Vaek6b63pMibw0bh4AyoAzO9oSMamasxTIBoIFCAjlTigZwZ/exec";

    // ฟังก์ชันดึงราคา (GET)
    async function fetchPrice() {
        const priceEl = document.getElementById("displayPrice");
        try {
            const res = await fetch(`${API_URL}?action=getPrice`);
            const data = await res.json();
            if (data.status === "success" && data.price) {
                const price = parseFloat(data.price).toLocaleString(undefined, {
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2 
                });
                priceEl.innerText = price;
                localStorage.setItem("cached_price", data.price);
            }
        } catch (e) {
            console.error("Fetch Error:", e);
            const saved = localStorage.getItem("cached_price");
            priceEl.innerText = saved ? parseFloat(saved).toLocaleString() : "1,251.21";
        }
    }

    // ฟังก์ชันจองด่วน (Fast Check-in)
    async function doFastCheckin() {
        const btn = document.getElementById('btnFastCheckin');
        btn.disabled = true;
        btn.innerText = "⏳ กำลังตรวจสอบ...";

        try {
            const res = await fetch(`${API_URL}?action=getPrice`);
            const data = await res.json();
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            if (data.bookedDates && data.bookedDates.includes(todayStr)) {
                Swal.fire({ title: 'ขออภัย', text: 'คืนนี้มีคนจองไปแล้วค่ะ', icon: 'error', background: '#111', color: '#fff' });
                btn.disabled = false;
                btn.innerText = "⚡ Fast Check-in (คืนนี้)";
                return;
            }

            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            
            const bookingObj = {
                checkin: todayStr,
                checkout: tomorrow.toISOString().split('T')[0],
                totalPrice: data.price || "1251.21",
                type: "Fast Check-in"
            };
            
            localStorage.setItem("pendingBooking", JSON.stringify(bookingObj));
            window.location.href = "payment.html";

        } catch (e) {
            Swal.fire({ title: 'Error', text: 'การเชื่อมต่อขัดข้อง', icon: 'error' });
            btn.disabled = false;
            btn.innerText = "⚡ Fast Check-in (คืนนี้)";
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchPrice();
        document.getElementById('btnFastCheckin').addEventListener('click', () => {
            Swal.fire({
                title: 'จองเข้าพักคืนนี้?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#fff',
                background: '#111',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) doFastCheckin();
            });
        });
    });
</script>

</body>
</html>
