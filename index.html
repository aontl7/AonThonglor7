<script>
// ฟังก์ชันบังคับเอาวันที่เครื่องแบบชัวร์ๆ ป้องกัน Safari รวน
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function fastCheckIn() {
  const btn = document.getElementById('btnFastCheckin');
  btn.disabled = true;
  btn.innerText = "กำลังตรวจสอบห้องว่าง...";

  // 1. เซ็ตวันที่: เช็คอิน=วันนี้, เช็คเอาท์=พรุ่งนี้ แบบบังคับ Local Time
  const today = new Date();
  const tomorrow = new Date();
  tomorrow.setDate(today.getDate() + 1);

  const checkinStr = getLocalYYYYMMDD(today); 
  const checkoutStr = getLocalYYYYMMDD(tomorrow);
  const nights = 1;
  const price = 1500;

  // 2. ใส่ URL ของ Google Apps Script ที่ Deploy มาใหม่ ตรงนี้
  const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbx8sGu-FbMMt23bZ-oRdTAl_0zAovIQVoNgfUIxjzZsuu_ezDXgtx_LCo9b6d-07s3T/exec"; 
  
  try {
    const response = await fetch(googleAppsScriptURL);
    const bookedDates = await response.json(); 
    
    if(bookedDates.includes(checkinStr)) {
       alert("ขออภัยค่ะ ห้องพักสำหรับคืนนี้เต็มแล้ว");
       btn.disabled = false;
       btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
       return; 
    }
    
    // 3. เซฟข้อมูลวันที่ 19-20 ลงเครื่องทับของเก่า
    const bookingData = {
      checkin: checkinStr,
      checkout: checkoutStr,
      nights: nights,
      totalPrice: price,
      type: "Fast Check-in",
      timestamp: new Date().toISOString()
    };

    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
    
    // 4. เด้งไปหน้า Payment
    window.location.href = "payment.html";

  } catch (error) {
    alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบจอง กรุณาลองใหม่อีกครั้งค่ะ");
    console.error("Fetch Error:", error);
    btn.disabled = false;
    btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
  }
}
</script>
