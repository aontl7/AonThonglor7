<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aon Thonglor 7</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f5f5f5;text-align:center;color:#111;}
.hero img{width:100%;display:block;}
.container{padding:30px 20px 40px;}
h1{font-size:36px;margin:10px 0 10px 0;}
.subtitle{color:#777;font-size:18px;}
.price{font-size:28px;margin-top:18px;}
.checkin{color:#777;margin-bottom:10px;}
.facilities{color:#555;font-size:16px;margin-bottom:30px;line-height:1.6;}
/* ปรับสไตล์ปุ่มให้เหมือนกันทั้ง <a> และ <button> */
.button{display:block;background:#000;color:white;text-decoration:none;padding:18px;margin:12px auto;max-width:320px;border-radius:14px;font-size:18px;cursor:pointer;border:none;width:100%;box-sizing:border-box;font-weight:bold;}
.button:disabled {background:#ccc;cursor:not-allowed;}
.map{margin-top:40px;}
iframe{width:100%;height:350px;border:0;}
</style>
</head>
<body>

<div class="hero">
<img src="room.png" alt="Room">
</div>

<div class="container">

<h1>Aon Thonglor 7</h1>

<div class="subtitle">Boutique Room in Thonglor • Bangkok</div>
<div class="price">1500 THB / Night</div>
<div class="checkin">Self Check-in 24 Hours</div>
<div class="facilities">Free WiFi • Aircon • Hot Shower • Fridge • Microwave</div>

<button class="button" id="btnFastCheckin" onclick="fastCheckIn()">Fast Check-in (เข้าพักวันนี้)</button>

<a class="button" href="booking.html">Book in Advance</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=143/6%20Sing%20Waet%20Lom%20Alley%20Bangkok&z=17&output=embed"></iframe>
</div>

</div>

<script>

// ฟังก์ชันจัดการวันที่
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function fastCheckIn() {
  const btn = document.getElementById('btnFastCheckin');
  btn.disabled = true;
  btn.innerText = "กำลังตรวจสอบห้องว่าง...";

  // 1. วาง URL ที่ก๊อปมาล่าสุดตรงนี้ค่ะบอส
  const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbxH7We7B-LdO6zwQ30LPgOxHIRmv0907-At52vBUtutkaNUBZHNs0XlW7oZMGSnkVCq/exec"; 

  try {
    const response = await fetch(googleAppsScriptURL);
    const data = await response.json();
    
    const today = new Date();
    const checkinStr = getLocalYYYYMMDD(today);
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    // 2. เช็กห้องว่าง (รองรับทั้งแบบ Array และ Object)
    let bookedDates = Array.isArray(data) ? data : (data.bookedDates || []);
    
    if(bookedDates.includes(checkinStr)) {
       alert("ขออภัยค่ะ ห้องพักสำหรับคืนนี้เต็มแล้ว");
       btn.disabled = false;
       btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
       return; 
    }
    
    // 3. ดึงราคาจาก Sheets (ถ้าไม่มีใช้ 1500)
    const currentPrice = data.price ? data.price : "1500";

    const bookingData = {
      checkin: checkinStr,
      checkout: getLocalYYYYMMDD(tomorrow),
      nights: 1,
      totalPrice: currentPrice,
      type: "Fast Check-in",
      timestamp: new Date().toISOString()
    };

    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
    window.location.href = "payment.html";

  } catch (error) {
    console.error(error);
    alert("การเชื่อมต่อมีปัญหา กรุณาลองใหม่อีกครั้ง หรือเช็กอินที่หน้าเคาน์เตอร์ค่ะ");
    btn.disabled = false;
    btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
  }
}
// ฟังก์ชันบังคับเอาวันที่เครื่องแบบชัวร์ๆ ป้องกันเบราว์เซอร์รวนเรื่อง Timezone
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function fastCheckIn() {
  const btn = document.getElementById('btnFastCheckin');
  btn.disabled = true;
  btn.innerText = "กำลังตรวจสอบห้องว่าง...";

  // 1. เซ็ตวันที่: เช็คอิน=วันนี้, เช็คเอาท์=พรุ่งนี้ แบบบังคับเวลาท้องถิ่น
  const today = new Date();
  const tomorrow = new Date();
  tomorrow.setDate(today.getDate() + 1);

  const checkinStr = getLocalYYYYMMDD(today); 
  const checkoutStr = getLocalYYYYMMDD(tomorrow);
  const nights = 1;
  const price = 1500;

  // 2. URL ของ Google Apps Script ที่คุณ Deploy ไว้
  const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbxH7We7B-LdO6zwQ30LPgOxHIRmv0907-At52vBUtutkaNUBZHNs0XlW7oZMGSnkVCq/exec"; 
  
  try {
    // 3. ดึงข้อมูลวันที่ถูกจองแล้วจาก Google Sheets
    const response = await fetch(googleAppsScriptURL);
    const bookedDates = await response.json(); 
    
    // 4. ตรวจสอบว่า "วันนี้" อยู่ในรายชื่อวันที่ถูกจองไปแล้วหรือยัง
    if(bookedDates.includes(checkinStr)) {
       alert("ขออภัยค่ะ ห้องพักสำหรับคืนนี้เต็มแล้ว");
       btn.disabled = false;
       btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
       return; 
    }
    
    // 5. ถ้าห้องว่าง ให้จัดเตรียมข้อมูลส่งเข้า LocalStorage ทับของเก่าไปเลย
    const bookingData = {
      checkin: checkinStr,
      checkout: checkoutStr,
      nights: nights,
      totalPrice: price,
      type: "Fast Check-in",
      timestamp: new Date().toISOString()
    };

    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
    
    // 6. เด้งไปหน้า Payment เพื่อชำระเงิน
    window.location.href = "payment.html";

  } catch (error) {
    alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบจอง กรุณาลองใหม่อีกครั้งค่ะ");
    console.error("Fetch Error:", error);
    btn.disabled = false;
    btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
  }
}
</script>

</body>
</html>
