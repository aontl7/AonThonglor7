<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Manager Panel - Thonglor 7</title>
<script src="config.js"></script> <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{margin:0;font-family:-apple-system,sans-serif;background:#000;color:#fff;text-align:center;padding-bottom:60px;}
.header-img{width:100%;height:220px;object-fit:cover;display:block;}
.box{background:#111;margin:-25px auto 30px;padding:25px;border-radius:24px;max-width:420px;border:1px solid #222;position:relative;}
h2{margin-top:0;font-size:18px;border-bottom:1px solid #333;padding-bottom:15px;color:#888;}
.section{margin-bottom:20px;text-align:left;background:#1a1a1a;padding:15px;border-radius:14px;border:1px solid #222;}
.section-title{font-size:11px;color:#666;font-weight:bold;margin-bottom:12px;text-transform:uppercase;}
.booking-list{width:100%;border-collapse:collapse;margin-top:5px;font-size:13px;}
.booking-list th{color:#444;text-align:left;padding:8px;border-bottom:1px solid #222;}
.booking-list td{padding:12px 8px;border-bottom:1px solid #1a1a1a;color:#ccc;}
.price-group{display:flex;align-items:center;background:#222;border:1px solid #333;border-radius:12px;overflow:hidden;margin-bottom:10px;}
.price-group input{width:50%;border:none;padding:14px;font-size:24px;text-align:right;background:transparent;color:#fff;outline:none;}
.price-group .fixed-unit{width:50%;background:#333;padding:14px;font-size:24px;color:#aaa;text-align:left;border-left:1px solid #444;font-weight:bold;}
.date-selector{width:100%;padding:12px;font-size:14px;background:#222;color:#fff;border:1px solid #333;border-radius:12px;margin-bottom:12px;outline:none;cursor:pointer;}
.btn{width:100%;padding:16px;font-size:16px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;margin-top:5px;}
.primary{background:#fff;color:#000;}
.weekend-btn{background:#400;color:#fff;border:1px solid #600;}
.door-btn{background:#400;color:#fff;height:70px;font-size:20px;border:1px solid #600;}
.line-btn{background:#111;color:#06C755;border:1px solid #222;margin-bottom:10px;text-decoration:none;display:block;text-align:center;line-height:45px;border-radius:12px;}
.status-text{font-size:10px;color:#555;margin-top:-5px;margin-bottom:10px;padding-left:5px;letter-spacing:0.5px;}
</style>
</head>
<body>
<img src="building.PNG" class="header-img">
<div class="box">
    <h2>SYSTEM CONTROL PANEL</h2>

    <div class="section">
        <div class="section-title">🔓 DOOR CONTROL</div>
        <button id="doorBtn" class="btn door-btn" onclick="openDoor()">OPEN FRONT DOOR</button>
    </div>

    <div class="section">
        <div class="section-title">📅 RECENT BOOKINGS</div>
        <table class="booking-list">
            <thead><tr><th>วันที่</th><th>ชื่อลูกค้า</th><th>ประเภท</th></tr></thead>
            <tbody id="bookingBody"><tr><td colspan="3" style="text-align:center;">กำลังดึงข้อมูล...</td></tr></tbody>
        </table>
    </div>

    <div class="section">
        <div class="section-title">📅 WEEKDAY CONTROL (MON-THU)</div>
        <select id="weekdayDaySelect" class="date-selector">
            <option value="weekdayAll">อัปเดตทั้ง 4 วัน (B1-E1)</option>
            <option value="mon">เฉพาะวันจันทร์ (B1)</option>
            <option value="tue">เฉพาะวันอังคาร (C1)</option>
            <option value="wed">เฉพาะวันพุธ (D1)</option>
            <option value="thu">เฉพาะวันพฤหัส (E1)</option>
        </select>
        <div class="price-group">
            <input type="number" id="weekdayPrice" placeholder="...">
            <div class="fixed-unit">0.00 THB</div>
        </div>
        <div id="weekdayStatus" class="status-text">จ: - | อ: - | พ: - | พฤ: -</div>
        <button class="btn primary" onclick="updatePrice('weekday')">UPDATE WEEKDAY</button>
    </div>

    <div class="section">
        <div class="section-title" style="color:#ff4444;">🔥 WEEKEND CONTROL (FRI-SUN)</div>
        <select id="weekendDaySelect" class="date-selector">
            <option value="weekendAll">อัปเดตทั้ง 3 วัน (F1-H1)</option>
            <option value="fri">เฉพาะวันศุกร์ (F1)</option>
            <option value="sat">เฉพาะวันเสาร์ (G1)</option>
            <option value="sun">เฉพาะวันอาทิตย์ (H1)</option>
        </select>
        <div class="price-group">
            <input type="number" id="weekendPrice" placeholder="...">
            <div class="fixed-unit">0.00 THB</div>
        </div>
        <div id="weekendStatus" class="status-text">ศุกร์: - | เสาร์: - | อาทิตย์: -</div>
        <button class="btn weekend-btn" onclick="updatePrice('weekend')">UPDATE WEEKEND PRICE</button>
    </div>

    <div class="section">
        <div class="section-title">📞 STAFF SERVICE</div>
        <a href="https://line.me/R/msg/text/?เรียกแม่บ้าน" class="line-btn">CALL MAID</a>
        <a href="https://line.me/R/msg/text/?ส่งซักผ้า" class="line-btn">LAUNDRY SERVICE</a>
    </div>
</div>

<script>
async function loadData() {
    if (typeof API_URL === 'undefined') return;
    try {
        const res = await fetch(`${API_URL}?action=getPrice`);
        const data = await res.json();
        
        const body = document.getElementById("bookingBody");
        body.innerHTML = "";
        if (data.recent && data.recent.length > 0) {
            data.recent.forEach(item => {
                body.innerHTML += `<tr><td>${item.date}</td><td>${item.name || '-'}</td><td>${item.type || 'Fast'}</td></tr>`;
            });
        }

        // หยอดค่าจริงจากชีทหาร 10 ลง Placeholder
        document.getElementById("weekdayPrice").placeholder = Math.floor(data.mon / 10);
        document.getElementById("weekendPrice").placeholder = Math.floor(data.fri / 10);
        
        // แสดงสถานะตัวเล็กแยกตามฝั่ง
        document.getElementById("weekdayStatus").innerHTML = `จ: ${data.mon} | อ: ${data.tue} | พ: ${data.wed} | พฤ: ${data.thu}`;
        document.getElementById("weekendStatus").innerHTML = `ศุกร์: ${data.fri} | เสาร์: ${data.sat} | อาทิตย์: ${data.sun}`;

    } catch (e) { console.error(e); }
}

async function updatePrice(mode) {
    let priceInput, action;
    if(mode === 'weekday') {
        priceInput = document.getElementById("weekdayPrice").value;
        let dayTarget = document.getElementById("weekdayDaySelect").value;
        if(dayTarget === "weekdayAll") action = "updateWeekdayAll";
        else if(dayTarget === "mon") action = "updateMon";
        else if(dayTarget === "tue") action = "updateTue";
        else if(dayTarget === "wed") action = "updateWed";
        else if(dayTarget === "thu") action = "updateThu";
    } else {
        priceInput = document.getElementById("weekendPrice").value;
        let dayTarget = document.getElementById("weekendDaySelect").value;
        if(dayTarget === "weekendAll") action = "updateWeekendAll";
        else if(dayTarget === "fri") action = "updateFri";
        else if(dayTarget === "sat") action = "updateSat";
        else if(dayTarget === "sun") action = "updateSun";
    }

    if(!priceInput) {
        Swal.fire({ title: 'ระบุเลข 3 หลักด้วยค่ะพี่ขา', icon: 'error', background: '#111', color: '#fff' });
        return;
    }

    Swal.fire({ title: 'กำลังอัปเดต...', background: '#111', color: '#fff', didOpen: () => Swal.showLoading() });

    try {
        const res = await fetch(`${API_URL}?action=${action}&price=${priceInput}`);
        const data = await res.json();
        if(data.status === "success") {
            Swal.fire({ title: 'Updated!', icon: 'success', timer: 1500, showConfirmButton: false, background: '#111', color: '#fff' });
            document.getElementById("weekdayPrice").value = "";
            document.getElementById("weekendPrice").value = "";
            loadData();
        }
    } catch (e) { }
}

async function openDoor() {
    const result = await Swal.fire({ title: 'เปิดประตู?', showCancelButton: true, background: '#111', color: '#fff' });
    if (result.isConfirmed) {
        fetch(`${API_URL}?action=openDoor`, { mode: 'no-cors' });
        Swal.fire({ title: 'สั่งการสำเร็จ', icon: 'success', timer: 2000, showConfirmButton: false, background: '#111', color: '#fff' });
    }
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
